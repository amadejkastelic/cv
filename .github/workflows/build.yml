name: Build and Publish Resume
on:
  push:
    branches:
      - main
    paths:
      - '**.typ'
      - '**.nix'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Checks
        run: nix flake check -L

      - name: Build PDF
        run: nix build .#pdf

      - name: Upload to Releases
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./result/resume.pdf
          asset_name: CV_AmadejKastelic.pdf
          tag: resume
          overwrite: true

  dispatch:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website flake update
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
        run: |
          gh api repos/amadejkastelic/amadejkastelic.github.io/dispatches \
            -f event_type=cv-updated \
            -f 'client_payload[sha]='"${{ github.sha }}"
